name: automerge-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, auto_merge_enabled]

permissions:
  statuses: write
  checks: read
  pull-requests: read
  actions: read

concurrency:
  group: automerge-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    if: github.event.pull_request.head.repo.id == github.event.pull_request.base.repo.id
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: pkgdeps/automerge-gate@v1.0.0
        with:
          context: 'automerge-gate/all-passed'
          poll-interval-seconds: '15'

  fork-bypass:
    if: github.event.pull_request.head.repo.id != github.event.pull_request.base.repo.id
    name: ${{ (github.event.pull_request.head.repo.id != github.event.pull_request.base.repo.id) && 'automerge-gate/all-passed' || 'fork-gate (skipped on same-repo)' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "fork PR bypass"
